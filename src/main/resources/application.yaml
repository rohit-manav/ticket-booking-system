spring:
  application:
    name: event-ticketing-system

  datasource:
    url: jdbc:mysql://localhost:3306/eventicketingsystem?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: user1
    password: print1
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

jwt:
  secret: this-is-a-very-long-secret-key-for-jwt-signing-change-it-in-production-must-be-at-least-64-bytes-long-for-hs512
  expiration: 86400000  # 24 hours in milliseconds

server:
  port: 8081
